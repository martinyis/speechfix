<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="orb-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc97ff"/>
      <stop offset="100%" stop-color="#699cff"/>
    </linearGradient>
    <clipPath id="top">
      <rect x="0" y="0" width="100" height="50"/>
    </clipPath>
    <clipPath id="bottom">
      <rect x="0" y="50" width="100" height="50"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" fill="#0e0e0e"/>
  <!-- Top half — solid, defined -->
  <circle cx="50" cy="50" r="36" fill="#cc97ff" clip-path="url(#top)"/>
  <!-- Bottom half — gradient reflection, slightly dimmer -->
  <circle cx="50" cy="50" r="36" fill="url(#orb-fill)" clip-path="url(#bottom)" opacity="0.72"/>
  <!-- Horizon line — subtle light catch -->
  <line x1="14" y1="50" x2="86" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
</svg>