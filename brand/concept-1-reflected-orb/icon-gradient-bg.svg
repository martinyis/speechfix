<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc97ff"/>
      <stop offset="100%" stop-color="#699cff"/>
    </linearGradient>
    <clipPath id="top">
      <rect x="0" y="0" width="100" height="50"/>
    </clipPath>
    <clipPath id="bottom">
      <rect x="0" y="50" width="100" height="50"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>
  <!-- Top half — white, defined -->
  <circle cx="50" cy="50" r="32" fill="rgba(255,255,255,0.95)" clip-path="url(#top)"/>
  <!-- Bottom half — white reflection, dimmer -->
  <circle cx="50" cy="50" r="32" fill="rgba(255,255,255,0.55)" clip-path="url(#bottom)"/>
  <!-- Horizon -->
  <line x1="18" y1="50" x2="82" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
</svg>