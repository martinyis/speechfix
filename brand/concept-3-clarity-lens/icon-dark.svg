<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lens-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc97ff"/>
      <stop offset="100%" stop-color="#699cff"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#0e0e0e"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#cc97ff" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="url(#lens-grad)" stroke-width="1.8"/>
  <!-- Focal point -->
  <circle cx="50" cy="50" r="5" fill="url(#lens-grad)"/>
</svg>